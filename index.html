<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Information App</title>
    <link rel="stylesheet" href="Country.css">
</head>
<body>
    <div class="background-layer" aria-hidden="true">
        <span class="orb orb-one"></span>
        <span class="orb orb-two"></span>
        <span class="orb orb-three"></span>
        <span class="grid-lines"></span>
    </div>

    <main class="container">
        <div class="top-bar">
            <button id="theme-toggle" type="button" aria-label="Toggle light and dark mode">
                <span id="theme-icon" aria-hidden="true">🌙</span>
            </button>
        </div>

        <header class="hero">
            <h1>Explore Countries</h1>
            <p>Discover key country insights with immersive visuals and smooth motion.</p>
        </header>

        <section class="search-box glass-card" aria-label="Country search">
            <input type="text" id="country-input" placeholder="Enter country name (e.g. India)" autocomplete="off">
            <button id="search-btn" type="button">Search</button>
        </section>

        <section id="result" class="glass-card" aria-live="polite"></section>
    </main>

    <template id="loading-template">
        <div class="loading">
            <span class="spinner"></span>
            <p>Fetching country data...</p>
        </div>
    </template>

    <script src="Country.js"></script>
</body>
</html>
